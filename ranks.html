  const sport = sportOf(g);
  $('sportTabs').innerHTML = SPORTS.map(s =>
    `<button class="rk-tab${s.id === sport.id ? ' active' : ''}" data-sport="${s.id}">${s.icon} ${s.label}</button>`).join('');
  document.querySelectorAll('[data-sport]').forEach(b => b.onclick = () => {
    const s = SPORTS.find(x => x.id === b.dataset.sport);
    if (s.id !== sport.id) { pos = null; setGame(s.games[0][0]); }
  });
  const roles = $('roleTabs');
  if (sport.id === 'cfb') {
    roles.innerHTML = [['', 'All'], ['QB', 'QBs'], ['RB', 'RBs'], ['WR', 'WRs']]
      .map(([id, label]) => `<button class="rk-tab${(pos || '') === id ? ' active' : ''}" data-pos="${id}">${label}</button>`).join('');
    roles.querySelectorAll('[data-pos]').forEach(b => b.onclick = () => { pos = b.dataset.pos || null; load(); });
  } else if (sport.games.length > 1) {
    roles.innerHTML = sport.games.map(([id, label]) =>
      `<button class="rk-tab${id === g ? ' active' : ''}" data-game="${id}">${label}</button>`).join('');
    roles.querySelectorAll('[data-game]').forEach(b => b.onclick = () => setGame(b.dataset.game));
  } else roles.innerHTML = '';
  document.querySelectorAll('.rk-scopes .rk-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.scope === scope);
    t.onclick = () => { scope = t.dataset.scope; load(); };
  });
  const opts = SORT_OPTIONS[g] || SORT_OPTIONS.pitcher;
  if (!opts.some(o => o.key === sort)) sort = 'ovr';
  const sel = $('sortSel');
  sel.innerHTML = opts.map(o => `<option value="${o.key}"${o.key === sort ? ' selected' : ''}>Sort: ${o.label}</option>`).join('');
  sel.onchange = () => { sort = sel.value; load(); };
  const db = $('dirBtn');
  db.textContent = dir === 'asc' ? '↑ Worst' : '↓ Best';
  db.classList.toggle('active', dir === 'asc');
  db.onclick = () => { dir = dir === 'asc' ? 'desc' : 'asc'; load(); };
  const onChallenge = scope === 'challenge';
  sel.style.display = onChallenge ? 'none' : '';
  db.style.display = onChallenge ? 'none' : '';
}
function setGame(game) {
  g = game;
  try { history.replaceState(null, '', '/ranks?game=' + g); } catch (e) {}
  load();
}

/* ---------- build strip (from the submitted build's slots) ---------- */
function stripHTML(entry) {
  const slots = entry && entry.build && Array.isArray(entry.build.slots) ? entry.build.slots : [];
  if (!slots.length) return '';
  return `<div class="rk-strip">` + slots.map(s => {
    const st = tier(Number(s.value) || 0);
    const val = s.display != null ? s.display : (s.value != null ? s.value : '-');
    return `<div class="sc t-${st}" title="${escapeHTML((s.slot || '') + ' · ' + (s.player || ''))}">
      <img src="${s.img || SILHOUETTE}" alt="" loading="lazy" onerror="this.onerror=null;this.src='${SILHOUETTE}'">
      <b class="c-${st}">${escapeHTML(String(val))}</b></div>`;
  }).join('') + `</div>`;
}

/* ---------- expanded row: full attribute breakdown ---------- */
function detailHTML(entry) {
  const slots = entry && entry.build && Array.isArray(entry.build.slots) ? entry.build.slots : [];
  if (!slots.length) return '<div class="rk-empty">This build was saved before details were tracked.</div>';
  const t = tier(entry.ovr);
  return `<div class="rk-dhead"><b class="c-${t}">${entry.ovr} OVR</b>
      <span>${TIER_LABELS[t]} · ${GAME_LABEL[entry.game || g] || 'Player'}${entry.build.pos ? ' · ' + escapeHTML(String(entry.build.pos)) : ''}</span></div>
    <div class="rk-slots">` + slots.map(s => {
    const st = tier(Number(s.value) || 0);
    const val = s.display != null ? s.display : (s.value != null ? s.value : '-');
    return `<div class="rk-slot t-${st}">
      <img src="${s.img || SILHOUETTE}" alt="" loading="lazy" onerror="this.onerror=null;this.src='${SILHOUETTE}'">
      <div class="tx"><b class="c-${st}">${escapeHTML(s.slot || '')}</b><span>${escapeHTML(s.player || 'Unknown')}${s.legend ? ' ★' : ''}</span></div>
      <div class="vl c-${st}">${escapeHTML(String(val))}</div>
    </div>`;
  }).join('') + `</div>`;
}

/* ---------- 👑 champion spotlight ---------- */
function champHTML(entry, label, sub) {
  if (!entry) return '';
  const t = tier(entry.ovr);
  const style = (entry.build && entry.build.style) || {};
  return `<div class="rk-champ"><div class="crown">👑</div>
    <div class="lbl">👑 ${label}</div>
    <div class="row1">
      ${avChip(style, 40) || ''}
      <div style="flex:1;min-width:0">
        <div class="nm"><span class="${fxCls(style)}">${escapeHTML(entry.name)}</span></div>
        <div class="sub">${TIER_LABELS[t]} · ${GAME_LABEL[entry.game || g] || 'Player'}${sub ? ' · ' + sub : ''}</div>
      </div>
      <div class="ovr"><b class="c-${t}">${entry.ovr}</b><span>OVR</span></div>
    </div>
    ${stripHTML(entry)}
  </div>`;
}

/* ---------- rows ---------- */
function rowHTML(rank, entry, i, cls) {
  const t = tier(entry.ovr);
  const style = (entry.build && entry.build.style) || {};
  const sorted = sort !== 'ovr' && scope !== 'challenge';
  const posTag = g === 'cfb' && !pos && entry.build && entry.build.pos
    ? ` <span class="sub">${escapeHTML(String(entry.build.pos))}</span>` : '';
  const sub = posTag + (sorted ? ` <span class="sub">${entry.ovr} OVR</span>` : '');
  const right = sorted
    ? `<div class="ov stat">${entry.stat == null ? '-' : (sort === 'war' ? Number(entry.stat).toFixed(1) : Math.round(entry.stat))}</div>`
    : `<div class="ov c-${t}">${entry.ovr}</div>`;
  const hasBuild = entry.build && Array.isArray(entry.build.slots) && entry.build.slots.length;
  return `<div class="rk-card ${cls || ''}" data-i="${i}">
      <div class="rk-row">
        <div class="rank">${rank}</div>
        ${avChip(style)}
        <div class="nm"><span class="${fxCls(style)}">${escapeHTML(entry.name)}</span>${sub}</div>
        ${right}
        <div class="chev">${hasBuild ? '›' : ''}</div>
      </div>
      ${stripHTML(entry)}
      <div class="rk-detail" data-d="${i}"></div>
    </div>`;
}
function bindRows() {
  document.querySelectorAll('#list .rk-card[data-i]').forEach(r => {
    r.onclick = () => {
      const i = Number(r.dataset.i);
      const e = entries[i];
      if (!e || !e.build || !Array.isArray(e.build.slots) || !e.build.slots.length) return;
      const d = document.querySelector(`#list .rk-detail[data-d="${i}"]`);
      const open = d.classList.contains('show');
      if (!open && !d.innerHTML) d.innerHTML = detailHTML(e);
      d.classList.toggle('show', !open);
      r.classList.toggle('open', !open);
    };
  });
}

/* ---------- loaders ---------- */
async function load() {
  renderNav();
  const list = $('list');
  list.innerHTML = '<div class="rk-empty">Loading…</div>';
  $('champ').innerHTML = ''; $('banner').innerHTML = '';
  entries = [];
  try {
    if (scope === 'challenge') return await loadChallenge();
    const meId = myEntryId();
    const posParam = g === 'cfb' && pos ? `&pos=${pos.toLowerCase()}` : '';
    const meParam = meId ? `&me=${meId}` : '';
    const sortParam = sort === 'ovr' && dir === 'asc' ? 'ovrAsc' : sort;
    const [data, ydata] = await Promise.all([
      fetch(`/api/score?scope=${scope}&limit=200&game=${g}&sort=${sortParam}&dir=${dir}${meParam}${posParam}`).then(r => r.json()),
      scope === 'daily'
        ? fetch(`/api/score?scope=yesterday&limit=1&game=${g}${posParam}`).then(r => r.json()).catch(() => null)
        : Promise.resolve(null),
    ]);
    if (!data.ok) throw new Error();
    let html = '';
    // 👑 spotlight: the current #1 (only on the default best-first OVR view), plus — on the
    // Today board — yesterday's locked-in champion.
    if (sort === 'ovr' && dir === 'desc' && data.rows.length) {
      html = ''; // champ card renders separately so the list keeps every rank
      $('champ').innerHTML =
        champHTML(data.rows[0], scope === 'daily' ? "Today's Leader" : 'All-time GOAT')
        + (ydata && ydata.ok && ydata.rows && ydata.rows.length
          ? champHTML(ydata.rows[0], "Yesterday's Champion", new Date(Date.now() - 86400000).toLocaleDateString())
          : '');
    }
    if (typeof data.total === 'number') {
      $('banner').innerHTML = `<div class="rk-banner"><b>${data.total.toLocaleString()}</b> build${data.total === 1 ? '' : 's'} on this board${scope === 'daily' ? ' today' : ''}</div>`;
    }
    if (data.me) {
      data.me.game = data.me.game || g;
      entries.push(data.me);
      html += rowHTML('#' + data.me.rank, { ...data.me, name: data.me.name + ' (you)' }, entries.length - 1, 'mine');
    }
    if (!data.rows.length) html += '<div class="rk-empty">No entries yet — be the first!</div>';
    else html += data.rows.map((r, idx) => {
      entries.push(r);
      const rank = idx + 1;
      const cls = [rank <= 3 ? 'top' + rank : '', myEntryId() && r.id === myEntryId() ? 'mine' : ''].filter(Boolean).join(' ');
      return rowHTML(rank, r, entries.length - 1, cls);
    }).join('');
    list.innerHTML = html;
    bindRows();
    if (window.gsap) gsap.fromTo('#list .rk-card, #list .rk-row.rk-card', { y: 10, opacity: 0 }, { y: 0, opacity: 1, duration: .3, stagger: .015, ease: 'power2.out' });
  } catch (e) {
    list.innerHTML = '<div class="rk-empty">Couldn\'t load this board — check your connection and try again.</div>';
  }
}
async function loadChallenge() {
  const list = $('list');
  try {
    const data = await fetch(`/api/score?action=challengeLeaderboard&game=${g}&limit=200&date=${todayLocal()}`).then(r => r.json());
    if (!data.ok) throw new Error();
    if (data.rows.length) $('champ').innerHTML = champHTML({ ...data.rows[0], game: g }, "Today's Daily Challenge Leader");
    $('banner').innerHTML = `<div class="rk-banner">🎯 Today's Daily Challenge · <b>${data.total}</b> player${data.total === 1 ? '' : 's'} played</div>`;
    list.innerHTML = data.rows.length
      ? data.rows.map((r, i) => {
          const rank = i + 1, t = tier(r.ovr);
          return `<div class="rk-row rk-card ${rank <= 3 ? 'top' + rank : ''}"><div class="rank">${rank}</div>
            <div class="nm">${escapeHTML(r.name)}</div><div class="ov c-${t}">${r.ovr}</div><div class="chev"></div></div>`;
        }).join('')
      : '<div class="rk-empty">No one has played today yet — be the first!</div>';
  } catch (e) {
    list.innerHTML = '<div class="rk-empty">Couldn\'t load the daily board.</div>';
  }
}

/* ---------- ⚔️ 1v1 Elo ladder ---------- */
const PVP_SPORTS = [['baseball', '⚾ Baseball'], ['hoops', '🏀 Hoops'], ['soccer', '⚽ Soccer'], ['cfb', '🏈 College']];
let pvpSport = 'baseball';
function principal() {
  try {
    const a = JSON.parse(localStorage.getItem('pl_account') || 'null');
    if (a && a.sub && a.sessionToken) return { sub: a.sub, sessionToken: a.sessionToken };
    const gid = localStorage.getItem('pl_guestId');
    return gid ? { guestId: gid } : {};
  } catch (e) { return {}; }
}
async function loadPvp() {
  $('pvpSportTabs').innerHTML = PVP_SPORTS.map(([id, label]) =>
    `<button class="rk-tab${id === pvpSport ? ' active' : ''}" data-pvp="${id}">${label}</button>`).join('');
  document.querySelectorAll('[data-pvp]').forEach(b => b.onclick = () => { pvpSport = b.dataset.pvp; loadPvp(); });
  const list = $('pvpList');
  list.innerHTML = '<div class="rk-empty">Loading…</div>';
  $('pvpChamp').innerHTML = '';
  try {
    const data = await fetch('/api/account', { method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify(Object.assign({ action: 'pvpLeaderboard', limit: 100, sport: pvpSport }, principal())) }).then(r => r.json());
    if (!data.ok) throw new Error();
    const rows = data.rows || [];
    if (rows.length) {
      const top = rows[0];
      $('pvpChamp').innerHTML = `<div class="rk-champ"><div class="crown">👑</div>
        <div class="lbl">👑 #1 Ranked Player</div>
        <div class="row1"><div style="flex:1;min-width:0">
          <div class="nm">${escapeHTML(top.name || 'Player')}</div>
          <div class="sub">${top.wins}-${top.losses} · ${PVP_SPORTS.find(x => x[0] === pvpSport)[1]}</div></div>
          <div class="ovr"><b class="c-gold">${top.elo}</b><span>RATING</span></div></div></div>`;
    }
    const meRank = data.me && data.me.rank;
    list.innerHTML = rows.length
      ? rows.map((r, i) => {
          const rank = i + 1;
          const cls = [rank <= 3 ? 'top' + rank : '', meRank === rank ? 'mine' : ''].filter(Boolean).join(' ');
          return `<div class="rk-row rk-card ${cls}" style="cursor:default"><div class="rank">${rank}</div>
            <div class="nm">${escapeHTML(r.name || 'Player')}</div>
            <div class="rec">${r.wins}-${r.losses}</div>
            <div class="elo">${r.elo}</div></div>`;
        }).join('')
        + (data.me && data.me.rank > rows.length
          ? `<div class="rk-row rk-card mine" style="cursor:default"><div class="rank">#${data.me.rank}</div><div class="nm">${escapeHTML(data.me.name || 'You')} (you)</div><div class="rec">${data.me.wins}-${data.me.losses}</div><div class="elo">${data.me.elo}</div></div>` : '')
      : '<div class="rk-empty">No ranked players yet — jump into a 1v1!</div>';
  } catch (e) {
    list.innerHTML = '<div class="rk-empty">Couldn\'t load the Elo ladder.</div>';
  }
}

/* ---------- mode toggle + boot ---------- */
$('modeBuilds').onclick = () => {
  $('modeBuilds').classList.add('active'); $('modePvp').classList.remove('active');
  $('buildsView').style.display = ''; $('pvpView').style.display = 'none';
};
$('modePvp').onclick = () => {
  $('modePvp').classList.add('active'); $('modeBuilds').classList.remove('active');
  $('buildsView').style.display = 'none'; $('pvpView').style.display = '';
  loadPvp();
};
load();
// cosmetics modules load deferred — repaint once so avatars/name effects land on the first view
window.addEventListener('load', () => { setTimeout(() => { if ($('buildsView').style.display !== 'none') load(); }, 400); });
</script>
