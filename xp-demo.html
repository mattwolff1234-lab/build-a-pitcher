<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pitching Lab — Player XP & Levels</title>
<meta name="robots" content="noindex">
<meta property="og:title" content="Pitching Lab — Player XP & Levels">
<meta property="og:description" content="Every game now earns XP. Level up and climb the ranks.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  :root{
    --bg0:#04070d; --bg1:#0a1320;
    --ink:#eaf2fb; --muted:#7e8da3; --dim:#56627a;
    --line:rgba(120,160,210,.16);
    --accent:#ff7a18; --accent2:#19c6ff; --gold:#ffce3a; --legend:#a366ff;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; }
  body{ background:var(--bg0); color:var(--ink); font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    min-height:100dvh; display:flex; align-items:center; justify-content:center; overflow:hidden; }

  /* animated stadium background (matches the games) */
  .bg{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
    background:radial-gradient(120% 90% at 50% -10%, #14253c 0%, var(--bg1) 38%, var(--bg0) 80%); }
  .bg .glow{ position:absolute; width:60vw; height:60vw; border-radius:50%; filter:blur(90px); opacity:.5; }
  .bg .g1{ background:radial-gradient(circle,#ff7a1855,transparent 60%); top:-12%; left:-10%; animation:drift1 26s ease-in-out infinite; }
  .bg .g2{ background:radial-gradient(circle,#19c6ff44,transparent 60%); bottom:-18%; right:-12%; animation:drift2 32s ease-in-out infinite; }
  .bg .grid{ position:absolute; inset:-50% 0 -10% 0; transform:perspective(520px) rotateX(62deg);
    background-image:linear-gradient(rgba(120,170,220,.10) 1px,transparent 1px),linear-gradient(90deg,rgba(120,170,220,.10) 1px,transparent 1px);
    background-size:46px 46px; mask-image:linear-gradient(transparent,#000 35%,#000 70%,transparent);
    animation:gridmove 4.5s linear infinite; opacity:.5; }
  .bg .scan{ position:absolute; inset:0; opacity:.05; background:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px); }
  @keyframes drift1{ 0%,100%{transform:translate(-6%,-4%);} 50%{transform:translate(8%,6%);} }
  @keyframes drift2{ 0%,100%{transform:translate(6%,4%);} 50%{transform:translate(-8%,-6%);} }
  @keyframes gridmove{ from{background-position:0 0;} to{background-position:0 46px;} }

  .stage{ position:relative; z-index:1; width:100%; display:flex; flex-direction:column; align-items:center; gap:20px; padding:20px; }

  /* the promo card */
  .card{ position:relative; width:min(460px,92vw); padding:28px 28px 24px; border-radius:20px;
    border:1px solid var(--line);
    background:linear-gradient(180deg, rgba(20,31,48,.82), rgba(9,15,25,.9)); backdrop-filter:blur(8px);
    box-shadow:0 30px 80px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05); }
  /* cyan corner brackets */
  .card::before,.card::after{ content:''; position:absolute; width:24px; height:24px; }
  .card::before{ top:12px; left:12px; border-top:2px solid var(--accent2); border-left:2px solid var(--accent2); border-radius:4px 0 0 0; }
  .card::after{ bottom:12px; right:12px; border-bottom:2px solid var(--accent2); border-right:2px solid var(--accent2); border-radius:0 0 4px 0; }

  .head{ display:flex; align-items:center; gap:10px; margin-bottom:3px; }
  .mark{ font-family:'Oswald',sans-serif; font-weight:700; font-size:22px; letter-spacing:2.5px; color:var(--ink); }
  .mark b{ color:var(--accent); }
  .newtag{ font-family:'Oswald',sans-serif; font-size:11px; font-weight:600; letter-spacing:2px; color:#04070d;
    background:linear-gradient(90deg,var(--accent2),var(--gold)); padding:3px 9px 2px; border-radius:5px; }
  .eyebrow{ font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--accent2); margin:14px 0 2px; }
  .title{ font-family:'Oswald',sans-serif; font-weight:700; font-size:30px; letter-spacing:.5px; line-height:1.05; margin-bottom:20px; }

  /* level readout */
  .lvl{ display:flex; align-items:center; gap:14px; margin-bottom:14px; }
  .rankico{ font-size:42px; line-height:1; filter:drop-shadow(0 0 10px rgba(255,206,58,.5)); transform-origin:center; }
  .lvl .col{ min-width:0; }
  .lvnum{ font-family:'Oswald',sans-serif; font-weight:700; font-size:40px; line-height:.95; letter-spacing:1px;
    background:linear-gradient(180deg,#fff,var(--gold)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .lvnum span{ font-size:52px; }
  .rankname{ font-family:'Oswald',sans-serif; font-size:15px; letter-spacing:2px; text-transform:uppercase; color:var(--accent2); margin-top:3px; }

  /* xp bar */
  .track{ position:relative; height:16px; border-radius:9px; overflow:hidden; background:rgba(120,150,190,.18);
    box-shadow:inset 0 1px 4px rgba(0,0,0,.55); }
  .fill{ position:absolute; inset:0 auto 0 0; width:0%; border-radius:9px;
    background:linear-gradient(90deg,var(--accent2),var(--gold)); box-shadow:0 0 14px rgba(25,198,255,.6); }
  .shine{ position:absolute; inset:0; opacity:0; pointer-events:none;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.9),transparent); }
  .xprow{ display:flex; justify-content:space-between; margin-top:7px;
    font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:.5px; color:var(--muted); }
  .xprow b{ color:var(--gold); }

  /* rank ladder */
  .ladder{ display:flex; justify-content:space-between; gap:4px; margin:18px 2px 4px; }
  .rung{ flex:1; display:flex; align-items:center; justify-content:center; height:34px; border-radius:9px;
    border:1px solid var(--line); background:rgba(16,32,46,.4); font-size:16px; filter:grayscale(1) brightness(.55); opacity:.6;
    transition:filter .3s, opacity .3s, border-color .3s, box-shadow .3s; }
  .rung.on{ filter:none; opacity:1; border-color:var(--gold); box-shadow:0 0 14px rgba(255,206,58,.35); background:rgba(255,206,58,.1); }

  .tagline{ margin-top:18px; font-size:13px; line-height:1.5; color:var(--muted); text-align:center; }
  .tagline b{ color:var(--ink); }
  .site{ margin-top:10px; text-align:center; font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:1.5px; color:var(--accent2); }

  .spark{ position:absolute; width:7px; height:7px; border-radius:50%; background:var(--gold); box-shadow:0 0 9px var(--gold); pointer-events:none; }

  /* controls (hidden in "clean" mode for screenshots) */
  .controls{ display:flex; gap:10px; }
  .controls button{ font-family:'Oswald',sans-serif; font-size:14px; letter-spacing:.5px; color:var(--ink);
    background:rgba(16,32,46,.7); border:1px solid var(--accent2); border-radius:10px; padding:11px 18px; cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,.4); }
  .controls button:hover{ box-shadow:0 0 16px rgba(25,198,255,.3); }
  .controls button:active{ transform:scale(.96); }
  body.clean .controls{ display:none; }
  body.clean .bg .glow,body.clean .bg .grid{ animation:none; }   /* freeze motion for crisp stills */

  .confetti{ position:fixed; inset:0; z-index:5; pointer-events:none; overflow:hidden; }
  .conf{ position:absolute; width:9px; height:14px; border-radius:2px; }

  @media (max-width:480px){
    .title{ font-size:26px; }
    .lvnum{ font-size:34px; } .lvnum span{ font-size:44px; } .rankico{ font-size:36px; }
  }
</style>
</head>
<body>
  <div class="bg"><div class="glow g1"></div><div class="glow g2"></div><div class="grid"></div><div class="scan"></div></div>

  <div class="stage">
    <div class="card" id="card">
      <div class="head">
        <span class="mark">PITCHING <b>LAB</b></span>
        <span class="newtag">NEW</span>
      </div>
      <div class="eyebrow">Now Live</div>
      <div class="title">Player XP &amp; Levels</div>

      <div class="lvl">
        <div class="rankico" id="rankico">🧢</div>
        <div class="col">
          <div class="lvnum">LV <span id="lv">1</span></div>
          <div class="rankname" id="rank">Rookie Ball</div>
        </div>
      </div>

      <div class="track"><div class="fill" id="fill"></div><div class="shine" id="shine"></div></div>
      <div class="xprow"><span id="into">0 / 100 XP</span><span><b id="total">0</b> total XP</span></div>

      <div class="ladder" id="ladder"></div>

      <div class="tagline"><b>Every mode earns XP</b> — builds, careers &amp; 1v1 Face Offs.<br>Level up and climb from Rookie Ball to Immortal.</div>
      <div class="site">goat-lab.app</div>
    </div>

    <div class="controls" id="controls">
      <button id="replay">▶ Replay</button>
      <button id="clean">📸 Clean</button>
      <button id="sound">🔊 Sound: Off</button>
    </div>
  </div>

  <div class="confetti" id="confetti"></div>

<script>
  // ---- same curve + ranks as the real xp.js engine ----
  const cumToReach = L => 25 * (L - 1) * (L + 2);
  const RANKS = [
    { min:1,  name:'Rookie Ball',  icon:'🧢' }, { min:5,  name:'Prospect',     icon:'🌱' },
    { min:10, name:'Call-Up',      icon:'📈' }, { min:16, name:'Everyday Guy', icon:'⚾' },
    { min:24, name:'All-Star',     icon:'⭐' }, { min:34, name:'Superstar',    icon:'🌟' },
    { min:46, name:'MVP',          icon:'🏆' }, { min:60, name:'Legend',       icon:'👑' },
    { min:80, name:'Immortal',     icon:'🐐' },
  ];
  const rankFor = L => { let r = RANKS[0]; for (const x of RANKS) if (L >= x.min) r = x; return r; };
  const $ = id => document.getElementById(id);

  const TARGET_LEVEL = 16;          // the reel climbs Rookie Ball → Everyday Guy
  const END_XP = Math.round(cumToReach(TARGET_LEVEL) + 0.45 * (cumToReach(TARGET_LEVEL + 1) - cumToReach(TARGET_LEVEL)));

  // build the rank ladder
  $('ladder').innerHTML = RANKS.map((r, i) => `<div class="rung" data-i="${i}" title="${r.name}">${r.icon}</div>`).join('');
  const rungs = [...document.querySelectorAll('.rung')];

  // ---- sound (off until enabled; a click gesture also unlocks the context) ----
  let actx, soundOn = false;
  function ding(big) {
    if (!soundOn) return;
    try {
      actx = actx || new (window.AudioContext || window.webkitAudioContext)();
      const now = actx.currentTime;
      const notes = big ? [392, 523.25, 659.25, 783.99, 1046.5, 1318.5] : [392, 523.25, 659.25, 783.99];
      notes.forEach((f, i) => {
        const o = actx.createOscillator(), g = actx.createGain();
        o.type = 'triangle'; o.frequency.value = f; const t = now + i * 0.07;
        g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.18, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        o.connect(g).connect(actx.destination); o.start(t); o.stop(t + 0.45);
      });
    } catch (e) {}
  }

  function segments(from, to) {
    const segs = []; let x = from, g = 0;
    while (g++ < 400) {
      const L = (() => { let l = 1; while (l < 999 && cumToReach(l + 1) <= x) l++; return l; })();
      const b = cumToReach(L + 1);
      if (to >= b) { segs.push({ from:x, to:b, level:L, end:true }); x = b; }
      else { segs.push({ from:x, to:to, level:L, end:false }); break; }
      if (x >= to) break;
    }
    return segs;
  }

  function setReadout(L, xpNow) {
    const rk = rankFor(L), c0 = cumToReach(L), c1 = cumToReach(L + 1);
    $('lv').textContent = L; $('rank').textContent = rk.name; $('rankico').textContent = rk.icon;
    $('into').textContent = `${Math.round(Math.max(c0, Math.min(c1, xpNow)) - c0).toLocaleString()} / ${(c1 - c0).toLocaleString()} XP`;
    rungs.forEach(r => r.classList.toggle('on', RANKS[+r.dataset.i].min <= L));
  }

  function sparkBurst(big) {
    const track = document.querySelector('.track');
    const n = big ? 22 : 11;
    for (let i = 0; i < n; i++) {
      const sp = document.createElement('span'); sp.className = 'spark'; track.appendChild(sp);
      const ang = (Math.random() * Math.PI) - Math.PI / 2, dist = 28 + Math.random() * 46;
      gsap.set(sp, { left: '94%', top: '50%' });
      gsap.to(sp, { x: Math.cos(ang) * dist, y: Math.sin(ang) * dist - 8, opacity: 0, scale: .3,
        duration: .6 + Math.random() * .3, ease: 'power2.out', onComplete: () => sp.remove() });
    }
  }

  function levelUp(L, big) {
    setReadout(L, cumToReach(L));
    ding(big);
    gsap.fromTo($('shine'), { opacity: 0, x: '-45%' }, { opacity: 1, x: '45%', duration: .5, ease: 'power1.out',
      onComplete: () => gsap.to($('shine'), { opacity: 0, duration: .2 }) });
    gsap.fromTo('.lvnum', { scale: 1.35, y: -4 }, { scale: 1, y: 0, duration: .5, ease: 'back.out(2.4)' });
    gsap.fromTo('#rankico', { scale: 1.4, rotate: -8 }, { scale: 1, rotate: 0, duration: .55, ease: 'back.out(2.6)' });
    gsap.fromTo('#card', { boxShadow: '0 30px 80px rgba(0,0,0,.6), 0 0 60px rgba(255,206,58,.55)' },
      { boxShadow: '0 30px 80px rgba(0,0,0,.6), 0 0 0 rgba(255,206,58,0)', duration: .7, ease: 'power2.out' });
    sparkBurst(big);
  }

  const CONF_COLORS = ['#19c6ff', '#ffce3a', '#ff7a18', '#a366ff', '#eaf2fb'];
  function confetti() {
    const box = $('confetti'); const N = 90;
    for (let i = 0; i < N; i++) {
      const c = document.createElement('div'); c.className = 'conf';
      c.style.background = CONF_COLORS[i % CONF_COLORS.length];
      c.style.left = (10 + Math.random() * 80) + 'vw'; c.style.top = '-20px';
      box.appendChild(c);
      gsap.to(c, { y: (60 + Math.random() * 40) + 'vh', x: (Math.random() * 200 - 100),
        rotation: Math.random() * 720 - 360, opacity: 0, duration: 1.8 + Math.random() * 1.2,
        ease: 'power1.in', delay: Math.random() * .3, onComplete: () => c.remove() });
    }
  }

  let running = false;
  function run() {
    if (running) return; running = true;
    // reset
    gsap.killTweensOf(['.lvnum', '#rankico', '#shine', '#card', '#fill']);
    $('confetti').innerHTML = '';
    setReadout(1, 0); $('fill').style.width = '0%'; $('total').textContent = '0';

    const segs = segments(0, END_XP);
    const tl = gsap.timeline({ onComplete: () => { running = false; } });

    let at = 0.15;
    segs.forEach((seg, idx) => {
      const c0 = cumToReach(seg.level), span = cumToReach(seg.level + 1) - c0;
      const frac = (seg.to - seg.from) / span;
      const dur = Math.max(.26, Math.min(.7, frac * 0.7)) * (idx > 8 ? .8 : 1);   // accelerate later
      const proxy = { v: seg.from };
      tl.add(() => setReadout(seg.level, seg.from), at);
      tl.to(proxy, { v: seg.to, duration: dur, ease: 'none',
        onUpdate: () => { $('fill').style.width = (((proxy.v - c0) / span) * 100) + '%';
          setReadout(seg.level, proxy.v);
          $('total').textContent = Math.round(proxy.v).toLocaleString(); } }, at);   // proxy.v is absolute total XP
      at += dur;
      if (seg.end) {
        tl.add(() => levelUp(seg.level + 1, false), at);
        tl.set('#fill', { width: '0%' }, at + 0.02);
        at += 0.30;
      }
    });
    // finale
    tl.add(() => { levelUp(TARGET_LEVEL, true); confetti(); }, at + 0.05);
    tl.add(() => {}, at + 1.4);
  }

  // controls
  $('replay').onclick = () => run();
  $('clean').onclick = () => {
    document.body.classList.toggle('clean');
    $('clean').textContent = document.body.classList.contains('clean') ? '🖊️ Show UI' : '📸 Clean';
  };
  $('sound').onclick = () => {
    soundOn = !soundOn;
    try { actx = actx || new (window.AudioContext || window.webkitAudioContext)(); if (actx.state === 'suspended') actx.resume(); } catch (e) {}
    $('sound').textContent = '🔊 Sound: ' + (soundOn ? 'On' : 'Off');
  };

  // autoplay the reel on load, then gently loop
  window.addEventListener('load', () => {
    run();
    setInterval(() => { if (!running && !document.hidden) run(); }, 4200);
  });
</script>
</body>
</html>
