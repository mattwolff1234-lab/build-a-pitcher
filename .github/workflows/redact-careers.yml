# One-shot maintenance: strip inflated stored careers from leaderboard rows
# (2026-07-10 batter HR sim bug — see api/score.js `redactCareers`).
# MANUAL trigger only. Runs from a GitHub runner because the endpoint may be
# unreachable from other maintenance environments. Always run with dry_run=1
# first and read the log before running with dry_run=0.
name: Redact inflated careers

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (1 = preview only, 0 = actually redact)'
        required: true
        default: '1'
      game:
        description: 'Game board to clean'
        required: true
        default: 'batter'
      since:
        description: 'Window start (ISO, default = bad deploy time)'
        required: false
        default: '2026-07-10T05:37:00Z'
      until:
        description: 'Window end (ISO, default = now)'
        required: false
        default: ''

jobs:
  redact:
    runs-on: ubuntu-latest
    steps:
      - name: Verify the fixed sim is live (abort otherwise)
        run: |
          n=$(curl -sf --max-time 30 https://pitchinglab.pitchergami.com/batting | grep -c 'superPow \* 0.00015' || true)
          if [ "$n" -lt 1 ]; then
            echo "::error::Production /batting does not contain the fixed HR formula yet — deploy not live. Aborting."
            exit 1
          fi
          echo "Fixed sim confirmed live."

      - name: Run redaction
        env:
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: |
          TOKEN="${STATS_TOKEN:-pl-balance-7f3a9c21}"
          BODY=$(printf '{"action":"redactCareers","token":"%s","game":"%s","since":"%s","until":"%s","dryRun":%s}' \
            "$TOKEN" "${{ inputs.game }}" "${{ inputs.since }}" "${{ inputs.until }}" \
            "$([ "${{ inputs.dry_run }}" = "0" ] && echo false || echo true)")
          echo "dry_run=${{ inputs.dry_run }} game=${{ inputs.game }} since=${{ inputs.since }} until=${{ inputs.until }}"
          curl -sf --max-time 60 -X POST https://pitchinglab.pitchergami.com/api/score \
            -H 'content-type: application/json' -d "$BODY" | tee result.json
          echo
          node -e "const r=require('./result.json'); if(!r.ok){console.error('FAILED',r);process.exit(1)}; console.log(r.dryRun?('DRY RUN — would redact '+r.count+' rows'):('REDACTED '+r.redacted+' rows'))"
