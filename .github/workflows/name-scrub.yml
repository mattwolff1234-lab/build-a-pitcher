# Maintenance: purge slur/profanity names already stored in the DB from before
# the name filter shipped (see api/account.js `nameScrub` + namefilter.js).
# Runs from a GitHub runner because the endpoint may be unreachable from other
# maintenance environments. Always run with dry_run=1 first and read the log
# before running with dry_run=0. Safe to re-run any time (idempotent).
name: Scrub blocked names

# Two triggers:
#  - workflow_dispatch (Actions tab -> Run workflow) with the input below
#  - push touching .github/name-scrub-request.json - the request params live in
#    that file, and the result is committed back as .github/name-scrub-result.json
#    (lets the scrub be driven from environments that can't call the Actions API)
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (1 = preview only, 0 = actually scrub)'
        required: true
        default: '1'
  push:
    paths: ['.github/name-scrub-request.json']

jobs:
  scrub:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve params (dispatch input, or name-scrub-request.json on push)
        id: params
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            node -e "
              const r = require('./.github/name-scrub-request.json');
              require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'dry_run=' + String(r.dry_run ?? '1') + '\n');
            "
          else
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify the name filter is live (abort otherwise)
        run: |
          n=$(curl -sf --max-time 30 https://pitchinglab.pitchergami.com/namefilter.js | grep -c 'NameFilter' || true)
          if [ "$n" -lt 1 ]; then
            echo "::error::Production is not serving namefilter.js yet — deploy not live. Aborting."
            exit 1
          fi
          echo "Name filter confirmed live."

      - name: Run name scrub
        env:
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
          DRY_RUN: ${{ steps.params.outputs.dry_run }}
        run: |
          TOKEN="${STATS_TOKEN:-pl-balance-7f3a9c21}"
          BODY=$(printf '{"action":"nameScrub","token":"%s","apply":%s}' \
            "$TOKEN" "$([ "$DRY_RUN" = "0" ] && echo 1 || echo 0)")
          echo "dry_run=$DRY_RUN"
          # response goes to a file, not the log — `found` contains the raw offending
          # names and this log is public. Only per-table COUNTS are printed/committed.
          curl -sf --max-time 120 -X POST https://pitchinglab.pitchergami.com/api/account \
            -H 'content-type: application/json' -d "$BODY" -o raw.json
          node -e "
            const fs = require('fs');
            const r = require('./raw.json');
            if (!r.ok) { console.error('FAILED', r.error || r); process.exit(1); }
            const counts = {};
            for (const [k, v] of Object.entries(r.found || {})) counts[k] = Array.isArray(v) ? v.length : Number(v) || 0;
            fs.writeFileSync('result.json', JSON.stringify({ ok: true, applied: !!r.applied, counts }, null, 2));
            const n = Object.values(counts).reduce((s, v) => s + v, 0);
            console.log((r.applied ? 'SCRUBBED ' : 'DRY RUN — would scrub ') + n + ' stored names/rows');
            console.log(JSON.stringify(counts, null, 2));
          "

      - name: Commit result back to the branch (push-triggered runs only)
        if: ${{ github.event_name == 'push' && always() }}
        run: |
          node -e "
            const fs = require('fs');
            let r = null;
            try { r = JSON.parse(fs.readFileSync('result.json', 'utf8')); }
            catch (e) { r = { ok: false, error: 'no result.json - see the Actions log' }; }
            fs.writeFileSync('.github/name-scrub-result.json', JSON.stringify({ ranAt: new Date().toISOString(), result: r }, null, 2) + '\n');
          "
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .github/name-scrub-result.json
          git commit -m 'name-scrub result [skip ci]' || exit 0
          git push
