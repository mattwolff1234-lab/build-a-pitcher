# GoatLab iOS build -> TestFlight. MANUAL trigger only (Actions tab -> iOS build -> Run).
# Needs repo secrets (App Store Connect > Users & Access > Integrations > Team Keys):
#   ASC_KEY_ID     - the key's ID
#   ASC_ISSUER_ID  - the issuer ID shown above the key list
#   ASC_KEY_P8     - the downloaded .p8 file, base64-encoded
name: iOS build (TestFlight)
on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Build web bundle + sync native project
        working-directory: ios-app
        run: |
          npm ci
          npm run build:www
          npx cap sync ios

      - name: Import App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.ASC_KEY_P8 }}" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Archive
        working-directory: ios-app/ios/App
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/App.xcarchive \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} MARKETING_VERSION=1.0.0 \
            DEVELOPMENT_TEAM=JBQB4PU4MN CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            archive

      - name: Export + upload to TestFlight
        working-directory: ios-app/ios/App
        run: |
          cat > ExportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
          </dict></plist>
          EOF
          xcodebuild -exportArchive -archivePath $PWD/build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
