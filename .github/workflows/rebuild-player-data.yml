name: Rebuild player data

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which data to rebuild'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - pitchers
          - batters

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild pitchers.json
        if: inputs.target == 'both' || inputs.target == 'pitchers'
        run: node fetch-data.js

      - name: Rebuild batters.json
        if: inputs.target == 'both' || inputs.target == 'batters'
        run: node fetch-batters.js

      - name: Commit rebuilt data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pitchers.json batters.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Rebuild player data (automated)"
            git push
          fi
